# Sigma Rule — Web Application Brute Force Login Attempt
# Generated by WebGuard SIEM | 2026-03-10

title: Web Application Brute Force Login Attempt
id: e1c3f5a7-4d9b-4c2e-8f6a-7b9d1f3e5c8a
status: stable
description: Detects rapid repeated POST requests to login endpoints indicating brute
  force.
author: WebGuard SIEM
date: 2024/11/22
references:
- https://attack.mitre.org/techniques/T1110/001/
tags:
- attack.credential_access
- attack.t1110.001
logsource:
  category: webserver
detection:
  selection:
    cs-method: POST
    c-uri|endswith:
    - /login
    - /signin
    - /auth
    - /wp-login.php
    sc-status: 401
  timeframe: 1m
  condition: selection | count() by c-ip > 10
falsepositives:
- Legitimate users mistyping passwords
level: high
fields:
- c-ip
- c-uri
- sc-status
- cs-User-Agent
