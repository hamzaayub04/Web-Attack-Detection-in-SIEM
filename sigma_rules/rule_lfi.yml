# Sigma Rule — Local File Inclusion / Path Traversal Attempt
# Generated by WebGuard SIEM | 2026-03-10

title: Local File Inclusion / Path Traversal Attempt
id: c7f1a3e5-2b8d-4f9c-a0e6-3d5b7c9e1f4a
status: stable
description: Detects LFI and directory traversal attacks in web URIs.
author: WebGuard SIEM
date: 2024/11/22
references:
- https://attack.mitre.org/techniques/T1083/
tags:
- attack.discovery
- attack.t1083
- owasp.a01_2021
logsource:
  category: webserver
detection:
  selection:
    c-uri|contains:
    - ../
    - ..%2f
    - '%2e%2e%2f'
    - '%252e%252e'
    - etc/passwd
    - etc/shadow
    - php://filter
    - php://input
    - /proc/self
    - '....//'
  condition: selection
falsepositives:
- Legitimate file operations with relative paths
level: critical
fields:
- c-ip
- c-uri
- cs-User-Agent
- sc-status
