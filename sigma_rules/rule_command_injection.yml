# Sigma Rule — OS Command Injection via Web Application
# Generated by WebGuard SIEM | 2026-03-10

title: OS Command Injection via Web Application
id: d9e2b4f6-3c7a-4b8e-9d1f-5a8c0e3f7b2d
status: stable
description: Detects OS command injection patterns in web request parameters.
author: WebGuard SIEM
date: 2024/11/22
references:
- https://attack.mitre.org/techniques/T1059/
tags:
- attack.execution
- attack.t1059
- owasp.a03_2021
logsource:
  category: webserver
detection:
  selection:
    c-uri|contains:
    - ; ls
    - ; cat
    - '| id'
    - '| whoami'
    - '`id`'
    - $(whoami)
    - '; wget '
    - '; curl '
    - '| nc -e'
    - /bin/bash
    - /bin/sh
    - cmd.exe
    - powershell
  condition: selection
falsepositives:
- None expected in production
level: critical
fields:
- c-ip
- c-uri
- cs-User-Agent
- sc-status
